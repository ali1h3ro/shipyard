server {
    listen 80;
    listen [::]:80;

    server_name {{DOMAIN}};

    root {{PROJECT_DIR}}/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/{{PROJECT_NAME}}.access.log;
    error_log /var/log/nginx/{{PROJECT_NAME}}.error.log;
}
